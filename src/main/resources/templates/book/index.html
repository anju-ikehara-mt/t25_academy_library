<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍一覧',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/index.css}" />
    <script type="text/javascript" th:src="@{/js/book/index.js}"></script>
</head>

<body>
    <div class="contents">
        <!-- div=ページ内のセクションを作るためのタグ -->
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                  <!-- ラベルと入力フィールドをグルーピング（まとめる）するための要素。フォームの見た目が整いやすくなる。 -->
                <div class="page_title">書籍一覧</div>
                <!-- class="page_title＝CSSなどで使うためのクラス名をつけている部分 -->
                <!-- 書籍一覧＝実際にブラウザで表示されるテキスト。このセクションのタイトルとして「書籍一覧」と表示される -->
                    <div class="btn_block" style="text-align:right;">
                    <a th:href="@{/book/add}" class ="btn_register">書籍登録</a> 
                             </div>
                <table class="books_table">
                    <thead><!-- 表のヘッダー部分（列の見出し）をまとめるタグ -->
                        <tr>
                            <th>書籍名</th>
                            <th>ISBN</th>
                        </tr>
                    </thead>
                    <tbody> <!-- 実際のデータ行をまとめる部分 -->
                        <tr th:each="bookMst : ${bookMstList}">
                            <td th:text="${bookMst.title}">書籍タイトル</td>
                            <td th:text="${bookMst.isbn}">ISBNコード</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
